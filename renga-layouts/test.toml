# Test layout — quick 2-pane sanity check
# Usage: from this ccmux directory, run: cargo run -- --layout test

version = 1
name = "test"

[root]
type = "split"
direction = "vertical"
ratio = 0.5

  [root.first]
  type = "pane"
  id = "left"
  command = "echo LeftPaneOK"

  [root.second]
  type = "pane"
  id = "right"
  command = "echo RightPaneOK"
