name: Deploy Docs + LP

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'lp/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build Nextra docs
        working-directory: docs
        run: npx next build

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          # Minimal landing page at site root
          cp -R lp/. _site/
          # Nextra docs at /docs/
          mkdir -p _site/docs
          cp -R docs/out/. _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
