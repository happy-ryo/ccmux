name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: renga-windows-x64.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: renga-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: renga-macos-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: renga-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/renga ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/renga.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum renga-windows-x64.exe/renga-windows-x64.exe \
                    renga-macos-x64/renga-macos-x64 \
                    renga-macos-arm64/renga-macos-arm64 \
                    renga-linux-x64/renga-linux-x64 \
            | sed 's|[^ ]*/||' > ../checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/renga-windows-x64.exe/renga-windows-x64.exe
            artifacts/renga-macos-x64/renga-macos-x64
            artifacts/renga-macos-arm64/renga-macos-arm64
            artifacts/renga-linux-x64/renga-linux-x64
            checksums.txt

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js 24 (includes npm 11)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Verify npm version
        run: npm --version

      - name: Determine npm dist-tag
        id: disttag
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm via Trusted Publishing
        working-directory: npm
        run: npm publish --access public --tag ${{ steps.disttag.outputs.tag }}
