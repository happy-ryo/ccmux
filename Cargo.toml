[package]
name = "ccmux"
# Fork keeps its own version line; intentionally stays below the
# upstream `0.6.0` bump. Next release will jump past it when we ship
# the image-preview sync + our own accumulated changes.
version = "0.5.8"
edition = "2021"
description = "Claude Code Multiplexer — manage multiple Claude Code instances in TUI panes"

[dependencies]
ratatui = "0.30"
crossterm = "0.29"
portable-pty = "0.8"
vt100 = "0.16"
anyhow = "1.0"
unicode-width = "0.2.1"
arboard = "3.6"
syntect = "5.3"
ureq = { version = "2", default-features = false, features = ["tls", "json"] }
serde_json = "1"
dirs = "5"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
# 2.4.2 removes the `CannotUnwind` guard from `exsync_op`. On 2.4.0 a
# Win32 write failure during IPC — normal when a `ccmux events` client
# disconnects ahead of the 30 s heartbeat — propagated via `?` before
# the guard's `.end()` ran, so its `Drop` aborted the whole TUI via
# `std::process::abort()` / `__fastfail`. Silent death, no panic. Pin
# so a downgrade can't reintroduce it.
interprocess = "2.4.2"
oneshot = "0.1"
subtle = "2"
humantime = "2"
# Upstream image-preview sync (#7): image decoding + ratatui-image
# picker / protocol detection for the preview panel.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "bmp", "webp"] }
ratatui-image = { version = "10", default-features = false, features = ["crossterm"] }

[target.'cfg(unix)'.dependencies]
# getuid() for the IPC endpoint directory name. Used only on Unix;
# on Windows the endpoint is a Named Pipe that doesn't need a uid.
libc = "0.2"
